<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmplant Fiyat Hesaplayıcı Premium</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #8d99ae;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 10px; 
            background-color: #edf2f4; 
            margin: 0; 
            color: var(--dark);
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }

        h2 { 
            text-align: center; 
            margin-top: 0; 
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        /* Sekme (Tab) Tasarımı */
        .tab-menu { 
            display: flex; 
            overflow-x: auto; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            gap: 10px;
            scrollbar-width: none;
        }
        .tab-menu::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            flex: 0 0 auto; 
            padding: 12px 20px; 
            background: var(--light); 
            border: 2px solid transparent; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px; 
            color: var(--gray);
            transition: all 0.3s ease;
        }
        .tab-btn.active { 
            background: rgba(67, 97, 238, 0.1); 
            border-color: var(--primary); 
            color: var(--primary); 
        }
        .tab-btn.settings-tab { color: var(--dark); }
        .tab-btn.settings-tab.active { 
            background: var(--dark); 
            border-color: var(--dark);
            color: white;
        }

        /* Form Elemanları */
        .form-group { margin-bottom: 15px; }
        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 6px; 
            font-size: 13px; 
            color: var(--gray); 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dfe6e9; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            background-color: var(--light);
            transition: border 0.3s;
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: white;
        }

        /* Butonlar */
        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.3s;
        }
        button:active { transform: scale(0.98); }
        
        .btn-success { background-color: var(--success); color: white; }
        .btn-primary { background-color: var(--primary); color: white; }
        
        /* Hesaplama Sonucu */
        .result { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: rgba(46, 204, 113, 0.1); 
            border-radius: 12px; 
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        .result p { margin: 8px 0; font-size: 14px; display: flex; justify-content: space-between;}
        .result hr { border: none; border-top: 1px dashed #b2bec3; margin: 15px 0; }
        .highlight { 
            font-weight: 800; 
            color: var(--primary); 
            font-size: 22px; 
            text-align: center; 
            display: block; 
            margin-top: 15px; 
        }
        .proof-text { font-size: 11px; color: var(--gray); text-align: center; margin-top: 10px; display: block;}

        /* Marka Kartları */
        .brand-card { 
            background: white; 
            padding: 15px; 
            border: 1px solid #dfe6e9; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .brand-header { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--dark); 
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #edf2f4;
        }
        .price-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .price-item { 
            background: var(--light); 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 13px;
        }
        .price-item span { display: block; color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;}
        .price-item strong { color: var(--dark); font-size: 14px; }
        
        .card-actions { display: flex; gap: 10px; }
        .card-actions button { padding: 10px; font-size: 13px; }
        .btn-edit { background-color: var(--warning); color: white; }
        .btn-delete { background-color: var(--danger); color: white; }
        .btn-cancel { background-color: var(--gray); color: white; }

        .section-title { 
            font-size: 16px; 
            font-weight: 700; 
            margin: 30px 0 15px 0; 
            color: var(--dark);
            display: flex;
            align-items: center;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dfe6e9;
            margin-left: 10px;
        }

        .edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tab-menu" id="tabMenu"></div>

        <div id="settingsView">
            <h2>⚙️ Marka Yönetimi</h2>
            
            <div id="brandsList"></div>

            <div class="section-title">Yeni Marka Ekle</div>
            <div class="brand-card">
                <div class="form-group">
                    <label>Marka Adı</label>
                    <input type="text" id="newName" placeholder="Örn: Alphatech">
                </div>
                <div class="edit-grid">
                    <div class="form-group">
                        <label>İmplant (₺)</label>
                        <input type="number" id="newImpPrice" placeholder="500">
                    </div>
                    <div class="form-group">
                        <label>Abutment (₺)</label>
                        <input type="number" id="newAbutPrice" placeholder="200">
                    </div>
                    <div class="form-group">
                        <label>Multiunit (₺)</label>
                        <input type="number" id="newMultiPrice" placeholder="300">
                    </div>
                    <div class="form-group">
                        <label>Cerrahi Set (₺)</label>
                        <input type="number" id="newSetPrice" placeholder="400">
                    </div>
                </div>
                <button class="btn-primary" onclick="addBrand()">Markayı Listeye Ekle</button>
            </div>
        </div>

        <div id="calcView" style="display:none;">
            <h2 id="calcTitle">Hesaplayıcı</h2>

            <div class="form-group">
                <label>İmplant Adeti</label>
                <input type="number" id="impQty" placeholder="Örn: 50">
            </div>

            <div class="form-group">
                <label>Abutment Adeti (%20 Bedelsiz)</label>
                <input type="number" id="abutQty" placeholder="Örn: 50">
            </div>

            <div class="form-group">
                <label>Multiunit Adeti</label>
                <input type="number" id="multiQty" placeholder="Örn: 10">
            </div>

            <div class="form-group">
                <label>Hedeflenen Brüt Kâr Marjı (%)</label>
                <input type="number" id="margin" placeholder="Örn: 40">
            </div>

            <button class="btn-success" onclick="calculate()">Maliyeti ve Satışı Hesapla</button>

            <div class="result" id="resultBox" style="display:none;">
                <p><strong>Maliyet Dökümü</strong></p>
                <hr>
                <p><span>İmplant:</span> <strong id="impCostDisp"></strong></p>
                <p><span>Abutment (%20 Hediye):</span> <strong id="abutCostDisp"></strong></p>
                <p><span>Multiunit:</span> <strong id="multiCostDisp"></strong></p>
                <p><span>Cerrahi Set (<span id="setCountDisp"></span>x):</span> <strong id="setCostDisp"></strong></p>
                <hr>
                <p><span>Toplam Maliyet:</span> <strong id="totalCostDisplay"></strong></p>
                <span class="highlight">Satılması Gereken Fiyat<br><br><span id="sellPriceDisplay"></span></span>
                <span class="proof-text" id="proofDisp"></span>
            </div>
        </div>
    </div>

    <script>
        // Yeni veri yapısı için farklı bir anahtar kelime kullandık
        let appData = JSON.parse(localStorage.getItem('implantProV2')) || {
            brands: [
                { id: Date.now().toString(), name: 'Örnek Marka', impPrice: 500, abutPrice: 200, multiPrice: 300, setPrice: 400 }
            ]
        };

        let activeBrandId = null;
        let editingBrandId = null;

        function saveData() {
            localStorage.setItem('implantProV2', JSON.stringify(appData));
        }

        function init() {
            renderTabs();
            if (appData.brands.length > 0) {
                openCalcView(appData.brands[0].id);
            } else {
                openSettingsView();
            }
        }

        function renderTabs() {
            const menu = document.getElementById('tabMenu');
            menu.innerHTML = ''; 

            const settingsBtn = document.createElement('button');
            settingsBtn.className = 'tab-btn settings-tab';
            settingsBtn.id = 'tab-settings';
            settingsBtn.innerText = '⚙️ Markalar';
            settingsBtn.onclick = openSettingsView;
            menu.appendChild(settingsBtn);

            appData.brands.forEach(brand => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.id = 'tab-' + brand.id;
                btn.innerText = brand.name;
                btn.onclick = () => openCalcView(brand.id);
                menu.appendChild(btn);
            });
        }

        function updateTabStyles(activeId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('tab-' + activeId);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function openSettingsView() {
            activeBrandId = null;
            editingBrandId = null;
            updateTabStyles('settings');
            document.getElementById('calcView').style.display = 'none';
            document.getElementById('settingsView').style.display = 'block';
            renderBrandsList();
        }

        function openCalcView(brandId) {
            activeBrandId = brandId;
            editingBrandId = null;
            updateTabStyles(brandId);
            document.getElementById('settingsView').style.display = 'none';
            document.getElementById('calcView').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';

            const brand = appData.brands.find(b => b.id === brandId);
            document.getElementById('calcTitle').innerText = brand.name + " Hesaplayıcı";
        }

        function addBrand() {
            const name = document.getElementById('newName').value.trim();
            const impPrice = parseFloat(document.getElementById('newImpPrice').value) || 0;
            const abutPrice = parseFloat(document.getElementById('newAbutPrice').value) || 0;
            const multiPrice = parseFloat(document.getElementById('newMultiPrice').value) || 0;
            const setPrice = parseFloat(document.getElementById('newSetPrice').value) || 0;

            if (!name) { alert("Lütfen bir marka adı girin."); return; }

            const newBrand = { id: Date.now().toString(), name, impPrice, abutPrice, multiPrice, setPrice };
            appData.brands.push(newBrand);
            saveData();
            
            document.getElementById('newName').value = '';
            document.getElementById('newImpPrice').value = '';
            document.getElementById('newAbutPrice').value = '';
            document.getElementById('newMultiPrice').value = '';
            document.getElementById('newSetPrice').value = '';
            
            renderTabs();
            renderBrandsList();
        }

        function renderBrandsList() {
            const list = document.getElementById('brandsList');
            list.innerHTML = '';
            
            appData.brands.forEach(brand => {
                const card = document.createElement('div');
                card.className = 'brand-card';

                if (editingBrandId === brand.id) {
                    card.innerHTML = `
                        <div class="form-group">
                            <label>Marka Adı</label>
                            <input type="text" id="edit_name" value="${brand.name}">
                        </div>
                        <div class="edit-grid">
                            <div class="form-group"><label>İmplant (₺)</label><input type="number" id="edit_imp" value="${brand.impPrice}"></div>
                            <div class="form-group"><label>Abutment (₺)</label><input type="number" id="edit_abut" value="${brand.abutPrice}"></div>
                            <div class="form-group"><label>Multiunit (₺)</label><input type="number" id="edit_multi" value="${brand.multiPrice}"></div>
                            <div class="form-group"><label>Set (₺)</label><input type="number" id="edit_set" value="${brand.setPrice}"></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-success" onclick="saveEdit('${brand.id}')">Kaydet</button>
                            <button class="btn-cancel" onclick="cancelEdit()">İptal</button>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="brand-header">${brand.name}</div>
                        <div class="price-grid">
                            <div class="price-item"><span>İmplant</span><strong>${formatCurrency(brand.impPrice)}</strong></div>
                            <div class="price-item"><span>Abutment</span><strong>${formatCurrency(brand.abutPrice)}</strong></div>
                            <div class="price-item"><span>Multiunit</span><strong>${formatCurrency(brand.multiPrice)}</strong></div>
                            <div class="price-item"><span>Cerrahi Set</span><strong>${formatCurrency(brand.setPrice)}</strong></div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-edit" onclick="startEdit('${brand.id}')">Düzenle</button>
                            <button class="btn-delete" onclick="deleteBrand('${brand.id}')">Sil</button>
                        </div>
                    `;
                }
                list.appendChild(card);
            });
        }

        function startEdit(id) {
            editingBrandId = id;
            renderBrandsList();
        }

        function cancelEdit() {
            editingBrandId = null;
            renderBrandsList();
        }

        function saveEdit(id) {
            const brand = appData.brands.find(b => b.id === id);
            brand.name = document.getElementById('edit_name').value.trim() || brand.name;
            brand.impPrice = parseFloat(document.getElementById('edit_imp').value) || 0;
            brand.abutPrice = parseFloat(document.getElementById('edit_abut').value) || 0;
            brand.multiPrice = parseFloat(document.getElementById('edit_multi').value) || 0;
            brand.setPrice = parseFloat(document.getElementById('edit_set').value) || 0;
            
            saveData();
            editingBrandId = null;
            renderTabs();
            renderBrandsList();
        }

        function deleteBrand(id) {
            if(confirm("Bu markayı silmek istediğinize emin misiniz?")) {
                appData.brands = appData.brands.filter(b => b.id !== id);
                saveData();
                renderTabs();
                renderBrandsList();
            }
        }

        function formatCurrency(val) {
            return val.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
        }

        function calculate() {
            if (!activeBrandId) return;

            const brand = appData.brands.find(b => b.id === activeBrandId);
            
            let impQty = parseFloat(document.getElementById('impQty').value) || 0;
            let abutQty = parseFloat(document.getElementById('abutQty').value) || 0;
            let multiQty = parseFloat(document.getElementById('multiQty').value) || 0;
            let margin = parseFloat(document.getElementById('margin').value) || 0;

            let implantCost = impQty * brand.impPrice;
            let abutmentCost = (abutQty * 0.8) * brand.abutPrice; 
            let multiunitCost = multiQty * brand.multiPrice; 
            let setCount = impQty > 0 ? Math.ceil(impQty / 100) : 0;
            let setCost = setCount * brand.setPrice; 

            let totalCost = implantCost + abutmentCost + multiunitCost + setCost;
            
            if (margin >= 100) {
                alert("Kâr marjı %100 veya daha büyük olamaz!");
                return;
            }
            
            let sellPrice = totalCost / (1 - (margin / 100));

            document.getElementById('impCostDisp').innerText = formatCurrency(implantCost);
            document.getElementById('abutCostDisp').innerText = formatCurrency(abutmentCost);
            document.getElementById('multiCostDisp').innerText = formatCurrency(multiunitCost);
            document.getElementById('setCountDisp').innerText = setCount;
            document.getElementById('setCostDisp').innerText = formatCurrency(setCost);

            document.getElementById('totalCostDisplay').innerText = formatCurrency(totalCost);
            document.getElementById('sellPriceDisplay').innerText = formatCurrency(sellPrice);
            
            let proofMargin = sellPrice > 0 ? ((sellPrice - totalCost) / sellPrice) * 100 : 0;
            document.getElementById('proofDisp').innerText = `Sağlama: (${formatCurrency(sellPrice)} - ${formatCurrency(totalCost)}) / Satış = %${proofMargin.toFixed(2)}`;

            document.getElementById('resultBox').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
